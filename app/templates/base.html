<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}LeadCare AI{% endblock %}</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      .error {
        color: #b00020;
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-top: 0.75rem;
      }
      input[type="email"],
      input[type="password"],
      input[type="text"],
      input[type="url"],
      select,
      textarea {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        box-sizing: border-box;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.5rem;
        border-bottom: 1px solid #ddd;
      }
      nav {
        margin: 1rem 0;
      }
      nav a {
        margin-right: 1rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.5rem 1rem;
      }
    </style>
  </head>
  <body>
    {% block content %}{% endblock %}
  </body>
</html>
