{% extends "base.html" %}

{% block title %}Login — LeadCare AI{% endblock %}

{% block content %}
  <h1>LeadCare AI</h1>
  <p>Sign in to continue.</p>

  {% if error %}
    <p class="error"><strong>{{ error }}</strong></p>
  {% endif %}

  <form method="post" action="/login">
    <label for="email">Email</label>
    <input
      id="email"
      name="email"
      type="email"
      required
      autocomplete="email"
      value="{{ prefill_email }}"
    />

    <label for="password">Password</label>
    <input
      id="password"
      name="password"
      type="password"
      required
      autocomplete="current-password"
    />

    <button type="submit">Log in</button>
  </form>
{% endblock %}
